<div class="dashboard-content">

  @if (currentRole === 'client') {
    <div class="client-welcome">
      <mat-card class="welcome-card">
        <mat-card-content>
          <h1>{{ 'dashboard.welcome' | translate:{ name: userName } }}</h1>
          <p style="margin-top: 8px; color: #aaa;">{{ 'dashboard.client_intro' | translate }}</p>
        </mat-card-content>
      </mat-card>
    </div>
  }

  @if (currentRole === 'admin') {
    <div class="admin-stats">
      <h1 style="color: white; margin-bottom: 24px;">{{ 'dashboard.admin_panel' | translate }}</h1>
      <div class="stub-page">
        <mat-icon class="stub-icon">home</mat-icon>
        <p>Coming soon</p>
      </div>
    </div>
  }

</div>
