<div class="shell">
  <app-sidebar></app-sidebar>
  <div class="shell__body">
    <header class="shell__topbar">
      <app-language-switcher></app-language-switcher>
      <div class="topbar__user">
        <mat-icon class="topbar__user-icon">account_circle</mat-icon>
        <div class="topbar__user-info">
          <span class="topbar__user-name">{{ auth.currentUser()?.name }}</span>
          <span class="topbar__user-role">{{ auth.currentUser()?.role | titlecase }}</span>
        </div>
        <button class="topbar__logout" (click)="logout()" [title]="'auth.logout' | translate">
          <mat-icon>logout</mat-icon>
        </button>
      </div>
    </header>
    <main class="shell__content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
