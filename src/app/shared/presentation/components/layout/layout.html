<div class="shell" [class.is-client]="currentRole === 'client'" [class.sidebar-open]="sidebarOpen">

  @if (currentRole === 'admin') {
    <app-sidebar [role]="currentRole" [open]="sidebarOpen" (linkClicked)="closeSidebar()"></app-sidebar>
    <div class="sidebar-overlay" (click)="closeSidebar()"></div>
  }

  <div class="shell__body">
    <header class="shell__topbar">
      @if (currentRole === 'admin') {
        <button class="topbar__hamburger" (click)="toggleSidebar()" aria-label="Toggle menu">
          <mat-icon>menu</mat-icon>
        </button>
      }
      <div style="flex-grow: 1;"></div>

      <a routerLink="/alerts" style="display: flex; align-items: center; color: inherit; text-decoration: none;" [title]="'nav.alerts' | translate">
        <mat-icon>notifications</mat-icon>
      </a>
      <app-user-profile></app-user-profile>
      <app-language-switcher></app-language-switcher>
    </header>

    <main class="shell__content">
      <router-outlet></router-outlet>
    </main>
  </div>

  @if (currentRole === 'client') {
    <app-bottom-bar></app-bottom-bar>
  }

</div>
