<div class="lang-selector-container">
  <div class="lang-selector">
    <button mat-button [matMenuTriggerFor]="menu" class="lang-btn">
      <div class="btn-content">
        <span class="prefix">{{ currentLang.code | uppercase }}</span>
        <span class="lang-name">{{ currentLang.name }}</span>
      </div>
      <span class="chevron">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </span>
    </button>

    <mat-menu #menu="matMenu" class="custom-lang-menu" xPosition="after">
      @for (lang of languages; track lang.code) {
        <button
          mat-menu-item
          (click)="useLanguage(lang)"
          class="lang-item"
          [class.active-item]="lang.code === currentLang.code">

          <div class="item-text">
            <span class="prefix">{{ lang.code | lowercase }}</span>
            <span class="lang-name">{{ lang.name }}</span>
          </div>

          @if (lang.code === currentLang.code) {
            <svg class="check-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          }
        </button>
      }
    </mat-menu>
  </div>
</div>
