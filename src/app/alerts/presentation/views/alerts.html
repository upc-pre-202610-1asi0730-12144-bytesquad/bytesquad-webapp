<div class="alerts-container">
  <div class="alerts-grid">
    @for (alert of alertsList; track alert.id) {
      <div class="alert-card">

        <button class="close-btn" (click)="deleteAlert($event, alert.id)" [title]="'alerts.deleteTitle' | translate">
          <mat-icon>close</mat-icon>
        </button>

        <div class="alert-card-top">
          <div class="alert-icon-container" [ngClass]="'bg-' + alert.type">
            <mat-icon>{{ alert.icon }}</mat-icon>
          </div>

          <div class="alert-content">
            <h3 class="alert-title">{{ resolveTitle(alert) }}</h3>
            <p class="alert-description">{{ resolveDescription(alert) }}</p>
          </div>
        </div>

        <div class="alert-card-bottom">
          <span class="alert-time">{{ getRelativeTime(alert.date) }}</span>
          <button class="details-btn" (click)="navigateTo(alert.targetRoute)">
            {{ 'alerts.detailsBtn' | translate }}
          </button>
        </div>

      </div>
    } @empty {
      <div class="empty-state">
        <mat-icon>done_all</mat-icon>
        <p>{{ 'alerts.emptyState' | translate }}</p>
      </div>
    }
  </div>
</div>
